<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="asset/style.css">
    <link rel="icon" href="asset/img/Logo.png" type="image/x-icon">
</head>
<body>
    <nav class="navigation">
        <div class="barreNav">
            <ul class="conteneurNav">
                <li><img class="logoNav" src="asset/img/LogoBarNav.png" alt="Logo"></li>
                <li><a class="lienNav" href="index.html">Accueil</a></li>
                <li><a class="lienNav" href="experience.html">Expérience</a></li>
                <li><a class="lienNav" href="projets.html">Projets</a></li>
                <li><a class="lienNav" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>
    <section class="body">
        <section class="contactPresentation">
            <div class="contenuContactPresentation">
                <h1>Contactez-moi</h1>
                <p>N'hésitez pas à me contacter pour toute question ou collaboration.</p>
            </div>
            <img src="asset/img/photo.png" alt="Photo de contact" class="photoContact">
        </section>
        <section class="contactForm">
            <form action="#" method="post">
                <div class="conteneurForm">
                    <div class="containerForm">
                        <label for="name">Nom:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="containerForm">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </div>
                <div class="formEmail">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <button type="submit">Envoyer</button>
                </div>
            </form>
        </section>
    
</body>
</html>
